# Server-side secret scan (defense-in-depth for the local pre-commit hook).
# The local .githooks/pre-commit only fires if a dev ran
#   git config core.hooksPath .githooks
# so it is silently inactive on fresh clones. This job runs on every push/PR
# regardless of local setup, and is the reliable backstop.
name: gitleaks

on:
  push:
    branches: ["**"]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit in the push/PR,
          # not just the tip. Required to catch a secret added in an
          # earlier commit of the same branch.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Uses the same allowlist/rules as the local hook.
          GITLEAKS_CONFIG: .gitleaks.toml
